# ═════════════════════════════════════════════════════════════════════
# Rigorix Release — Publish crates to crates.io
#
# Triggered by pushing a git tag matching v*.*.*
# Pre-requisite: run CI + Hardening first (manual approval gate)
# ═════════════════════════════════════════════════════════════════════

name: Release

on:
  push:
    tags: ["v*.*.*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Gate: Verify tag matches Cargo.toml versions ──────────────
  verify:
    name: 🔍 Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check version consistency
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag version: $TAG_VERSION"

          for crate in engine cli actions; do
            CRATE_VERSION=$(grep '^version' "$crate/Cargo.toml" | head -1 | sed 's/version = "//;s/"//')
            echo "$crate: $CRATE_VERSION"
            if [[ "$CRATE_VERSION" != "$TAG_VERSION" ]]; then
              echo "❌ $crate version $CRATE_VERSION != tag $TAG_VERSION"
              exit 1
            fi
          done
          echo "✅ All versions match tag"

  # ── Publish each crate in dependency order ────────────────────
  publish-engine:
    name: 📦 Publish engine
    needs: [verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Publish rigorix-engine
        run: cargo publish -p rigorix-engine --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-cli:
    name: 📦 Publish CLI
    needs: [publish-engine]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Publish rigorix-cli
        run: cargo publish -p rigorix-cli --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-actions:
    name: 📦 Publish actions
    needs: [publish-engine]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Publish rigorix-actions
        run: cargo publish -p rigorix-actions --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── Create GitHub Release ─────────────────────────────────────
  github-release:
    name: 🏷️ GitHub Release
    needs: [publish-cli, publish-actions]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate changelog
        shell: bash
        run: |
          echo "# Rigorix ${{ github.ref_name }}" > release-notes.md
          echo "" >> release-notes.md
          echo "See [CHANGELOG](.pi/architecture/CHANGELOG.md) for details." >> release-notes.md
          echo "" >> release-notes.md
          echo "## Crates Published" >> release-notes.md
          echo "- [rigorix-engine](https://crates.io/crates/rigorix-engine)" >> release-notes.md
          echo "- [rigorix-cli](https://crates.io/crates/rigorix-cli)" >> release-notes.md
          echo "- [rigorix-actions](https://crates.io/crates/rigorix-actions)" >> release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          generate_release_notes: true
