# ═════════════════════════════════════════════════════════════════════
# Rigorix CI Pipeline — Multi-stage, multi-crate, DRY
#
# Stages:
#   1. lint       — cargo fmt + clippy (all crates via matrix)
#   2. build      — cargo build (all crates via matrix)
#   3. test       — cargo test (all crates via matrix)
#   4. security   — cargo audit + secret scan
#   5. docs       — canonical reference validation
#   6. coverage   — code coverage via cargo-tarpaulin
#
# Per-crate stage scripts are discovered dynamically from
#   $crate/.pi/scripts/ci/stage_*.sh
#   $crate/.pi/scripts/validate-*.sh
# Non-core scripts use continue-on-error to avoid blocking on
# legacy coverage thresholds and generated contract checkers.
# ═════════════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Stage 0: Workspace Overview ───────────────────────────────
  workspace:
    name: 📋 Workspace
    runs-on: ubuntu-latest
    outputs:
      crates: ${{ steps.crates.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: 🔍 Detect workspace crates
        id: crates
        shell: bash
        run: |
          CRATES=$(grep -A50 '^\[workspace\]' Cargo.toml | grep 'members' | head -1 | sed 's/.*= \[//;s/\]//;s/"//g;s/, /\n/g' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "matrix=$CRATES" >> "$GITHUB_OUTPUT"
          echo "Crates: $CRATES"

  # ── Stage 1: Lint (fmt + clippy) ──────────────────────────────
  lint:
    name: 🔎 Lint (${{ matrix.crate }})
    needs: [workspace]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: ${{ fromJson(needs.workspace.outputs.crates) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          cache-key: lint-${{ matrix.crate }}
      - run: cargo fmt --check -p rigorix-${{ matrix.crate }}
      - run: cargo clippy -p rigorix-${{ matrix.crate }} -- -D warnings
      - name: Per-crate lint scripts
        continue-on-error: true
        run: |
          for script in .pi/scripts/ci/stage_lint.sh .pi/scripts/validate-ci.sh; do
            [ -f "$script" ] && echo "--- $script ---" && bash "$script" || true
          done
        working-directory: ${{ matrix.crate }}

  # ── Stage 2: Build ────────────────────────────────────────────
  build:
    name: 📦 Build (${{ matrix.crate }})
    needs: [workspace, lint]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: ${{ fromJson(needs.workspace.outputs.crates) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          cache-key: build-${{ matrix.crate }}
      - run: cargo build -p rigorix-${{ matrix.crate }} --release
      - name: Per-crate build scripts
        continue-on-error: true
        run: |
          for script in .pi/scripts/ci/stage_static_analysis.sh .pi/scripts/ci/stage_package_build.sh; do
            [ -f "$script" ] && echo "--- $script ---" && bash "$script" || true
          done
        working-directory: ${{ matrix.crate }}

  # ── Stage 3: Test ─────────────────────────────────────────────
  test:
    name: 🧪 Test (${{ matrix.crate }})
    needs: [workspace, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: ${{ fromJson(needs.workspace.outputs.crates) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          cache-key: test-${{ matrix.crate }}
      - run: cargo test -p rigorix-${{ matrix.crate }}
      - name: Per-crate test scripts
        continue-on-error: true
        run: |
          for script in .pi/scripts/ci/stage_unit.sh .pi/scripts/ci/stage_integration.sh; do
            [ -f "$script" ] && echo "--- $script ---" && bash "$script" || true
          done
          # Run all proofing scripts
          for script in .pi/scripts/ci/*_proofing.sh; do
            [ -f "$script" ] && echo "--- $script ---" && bash "$script" || true
          done
        working-directory: ${{ matrix.crate }}

  # ── Stage 4: Security ─────────────────────────────────────────
  audit:
    name: 🔒 Audit
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: cargo audit --ignore RUSTSEC-2024-0436 --ignore RUSTSEC-2026-0002
      - name: Secret scan
        shell: bash
        run: |
          for crate in engine cli actions; do
            results=$(grep -rE "(sk-[A-Za-z0-9]{32,}|ghp_[A-Za-z0-9]{36}|AKIA[0-9A-Z]{16})" \
              --include="*.rs" --include="*.toml" --include="*.yml" --include="*.yaml" \
              --include="*.env" --include="*.sh" "$crate/" 2>/dev/null \
              | grep -v ".git" | grep -v ".rigorix" | grep -v "ghp_secret12345" \
              | grep -v "AKIAIOSFODNN7EXAMPLE" || true)
            if [[ -n "$results" ]]; then
              echo "❌ Secrets found in $crate:"
              echo "$results"
              exit 1
            fi
          done
          echo "✅ No secrets detected"

  # ── Stage 5: Documentation ────────────────────────────────────
  docs:
    name: 📝 Documentation
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - continue-on-error: true
        run: |
          for script in .pi/scripts/validate-canonical.sh .pi/scripts/validate-architecture.sh \
                       .pi/scripts/validate-architecture-readiness.sh; do
            [ -f "$script" ] && echo "--- $script ---" && bash "$script" || true
          done

  # ── Stage 6: Code Coverage ────────────────────────────────────
  coverage:
    name: 📊 Coverage
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: cargo tarpaulin -p rigorix-engine --out Xml --output-dir coverage/engine || true
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: coverage/
        if: always()

  # ── Stage 7: Integration ──────────────────────────────────────
  integration:
    name: 🔗 Integration
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: cargo test --workspace -- --ignored || true
      - continue-on-error: true
        run: |
          for script in .pi/scripts/validate-integration.sh .pi/scripts/validate-operations.sh; do
            [ -f "$script" ] && echo "--- $script ---" && bash "$script" || true
          done

  # ── Stage 8: Final Gate ───────────────────────────────────────
  gate:
    name: 🚪 Final Gate
    needs: [lint, build, test, audit, docs, coverage, integration]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Lint:        ${{ needs.lint.result }}"
          echo "Build:       ${{ needs.build.result }}"
          echo "Test:        ${{ needs.test.result }}"
          echo "Audit:       ${{ needs.audit.result }}"
          echo "Docs:        ${{ needs.docs.result }}"
          echo "Coverage:    ${{ needs.coverage.result }}"
          echo "Integration: ${{ needs.integration.result }}"
      - name: ✅ All mandatory stages passed
        if: |
          needs.lint.result == 'success' &&
          needs.build.result == 'success' &&
          needs.test.result == 'success' &&
          needs.audit.result == 'success'
        run: echo "✅ All mandatory stages passed"
      - name: ❌ Some mandatory stages failed
        if: |
          needs.lint.result != 'success' ||
          needs.build.result != 'success' ||
          needs.test.result != 'success' ||
          needs.audit.result != 'success'
        run: |
          echo "❌ Mandatory stage(s) failed"
          exit 1
