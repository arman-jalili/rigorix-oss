# ═════════════════════════════════════════════════════════════════════
# Rigorix CI — PR merge gate
#
# Runs on every push to feat/fix branches and all PRs. Fast enough for
# the inner dev loop, comprehensive enough that a green build means
# main won't break. Uses cargo check (not --release) and skips coverage
# for speed — hardening.yml handles those on main.
#
# Stages:
#   0. workspace  — detect crates dynamically
#   1. lint       — cargo fmt + clippy (matrix per crate)
#   2. build      — cargo check (matrix per crate)
#   3. test       — cargo test --lib (matrix per crate, 30m timeout)
#   4. security   — cargo audit + secret scan
#   5. docs       — documentation + architecture validation
#   6. integration— cargo test --workspace + integration validation
#   7. gate       — final mandatory check
#
# Script discovery uses comprehensive globs — new scripts of any
# convention (check_*, run_*, stage_*, validate_*, validate-*)
# auto-run without workflow changes.
# ═════════════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Stage 0: Workspace Overview ───────────────────────────────
  workspace:
    name: 📋 Workspace
    runs-on: ubuntu-latest
    outputs:
      crates: ${{ steps.crates.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: 🔍 Detect workspace crates
        id: crates
        shell: bash
        run: |
          CRATES=$(for d in */; do
            [ -d "${d}.pi/scripts" ] && echo "${d%/}"
          done | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "matrix=$CRATES" >> "$GITHUB_OUTPUT"
          echo "Crates: $CRATES"

  # ── Stage 1: Lint (fmt + clippy) ──────────────────────────────
  lint:
    name: 🔎 Lint (${{ matrix.crate }})
    needs: [workspace]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        crate: ${{ fromJson(needs.workspace.outputs.crates) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          cache-key: lint-${{ matrix.crate }}
      - run: cargo fmt --check -p rigorix-${{ matrix.crate }}
      - run: cargo clippy -p rigorix-${{ matrix.crate }} -- -D warnings
      - name: Per-crate scripts (all conventions)
        continue-on-error: true
        run: |
          for script in .pi/scripts/ci/check_*.sh .pi/scripts/ci/run_*.sh \
                       .pi/scripts/ci/stage_*.sh .pi/scripts/ci/validate_*.sh \
                       .pi/scripts/validate-*.sh; do
            [ -f "$script" ] && [[ "$script" != *_coverage.sh ]] && echo "--- $script ---" && bash "$script" || true
          done
        working-directory: ${{ matrix.crate }}

  # ── Stage 2: Build (cargo check — fast compile verification) ─
  build:
    name: 📦 Build (${{ matrix.crate }})
    needs: [workspace, lint]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        crate: ${{ fromJson(needs.workspace.outputs.crates) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          cache-key: build-${{ matrix.crate }}
      - run: cargo check -p rigorix-${{ matrix.crate }}
      - name: Per-crate scripts (all conventions)
        continue-on-error: true
        run: |
          for script in .pi/scripts/ci/check_*.sh .pi/scripts/ci/run_*.sh \
                       .pi/scripts/ci/stage_*.sh .pi/scripts/ci/validate_*.sh \
                       .pi/scripts/validate-*.sh; do
            [ -f "$script" ] && [[ "$script" != *_coverage.sh ]] && echo "--- $script ---" && bash "$script" || true
          done
        working-directory: ${{ matrix.crate }}

  # ── Stage 3: Test ─────────────────────────────────────────────
  test:
    name: 🧪 Test (${{ matrix.crate }})
    needs: [workspace, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        crate: ${{ fromJson(needs.workspace.outputs.crates) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          cache-key: test-${{ matrix.crate }}
      - run: cargo test -p rigorix-${{ matrix.crate }} --lib
      - name: Per-crate scripts (all conventions)
        continue-on-error: true
        run: |
          for script in .pi/scripts/ci/check_*.sh .pi/scripts/ci/run_*.sh \
                       .pi/scripts/ci/stage_*.sh .pi/scripts/ci/validate_*.sh \
                       .pi/scripts/validate-*.sh; do
            [ -f "$script" ] && [[ "$script" != *_coverage.sh ]] && echo "--- $script ---" && bash "$script" || true
          done
        working-directory: ${{ matrix.crate }}

  # ── Stage 4: Security ─────────────────────────────────────────
  audit:
    name: 🔒 Audit
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: cargo audit --ignore RUSTSEC-2024-0436 --ignore RUSTSEC-2026-0002
      - name: Secret scan
        shell: bash
        run: |
          results=$(grep -rE "(sk-[A-Za-z0-9]{32,}|ghp_[A-Za-z0-9]{36}|AKIA[0-9A-Z]{16})" \
            --include="*.rs" --include="*.toml" --include="*.yml" --include="*.yaml" \
            --include="*.env" --include="*.sh" . 2>/dev/null \
            | grep -v ".git" | grep -v ".rigorix" | grep -v "ghp_secret12345" \
            | grep -v "AKIAIOSFODNN7EXAMPLE" || true)
          if [[ -n "$results" ]]; then
            echo "❌ Secrets found:"
            echo "$results"
            exit 1
          fi
          echo "✅ No secrets detected"
      - name: Root + per-crate scripts (all conventions)
        continue-on-error: true
        shell: bash
        run: |
          for script in .pi/scripts/ci/check_*.sh .pi/scripts/ci/run_*.sh \
                       .pi/scripts/ci/stage_*.sh .pi/scripts/ci/validate_*.sh \
                       .pi/scripts/validate-*.sh \
                       */.pi/scripts/ci/check_*.sh */.pi/scripts/ci/run_*.sh \
                       */.pi/scripts/ci/stage_*.sh */.pi/scripts/ci/validate_*.sh \
                       */.pi/scripts/validate-*.sh; do
            [ -f "$script" ] && [[ "$script" != *_coverage.sh ]] && echo "--- $script ---" && bash "$script" || true
          done

  # ── Stage 5: Documentation + Architecture ─────────────────────
  docs:
    name: 📝 Documentation
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Root + per-crate scripts (all conventions)
        continue-on-error: true
        shell: bash
        run: |
          for script in .pi/scripts/ci/check_*.sh .pi/scripts/ci/run_*.sh \
                       .pi/scripts/ci/stage_*.sh .pi/scripts/ci/validate_*.sh \
                       .pi/scripts/validate-*.sh \
                       */.pi/scripts/ci/check_*.sh */.pi/scripts/ci/run_*.sh \
                       */.pi/scripts/ci/stage_*.sh */.pi/scripts/ci/validate_*.sh \
                       */.pi/scripts/validate-*.sh; do
            [ -f "$script" ] && [[ "$script" != *_coverage.sh ]] && echo "--- $script ---" && bash "$script" || true
          done

  # ── Stage 6: Integration ──────────────────────────────────────
  integration:
    name: 🔗 Integration
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: cargo test --workspace
      - name: Root + per-crate scripts (all conventions)
        continue-on-error: true
        shell: bash
        run: |
          for script in .pi/scripts/ci/check_*.sh .pi/scripts/ci/run_*.sh \
                       .pi/scripts/ci/stage_*.sh .pi/scripts/ci/validate_*.sh \
                       .pi/scripts/validate-*.sh \
                       */.pi/scripts/ci/check_*.sh */.pi/scripts/ci/run_*.sh \
                       */.pi/scripts/ci/stage_*.sh */.pi/scripts/ci/validate_*.sh \
                       */.pi/scripts/validate-*.sh; do
            [ -f "$script" ] && [[ "$script" != *_coverage.sh ]] && echo "--- $script ---" && bash "$script" || true
          done

  # ── Stage 7: Final Gate ───────────────────────────────────────
  gate:
    name: 🚪 Final Gate
    needs: [lint, build, test, audit, docs, integration]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Lint:        ${{ needs.lint.result }}"
          echo "Build:       ${{ needs.build.result }}"
          echo "Test:        ${{ needs.test.result }}"
          echo "Audit:       ${{ needs.audit.result }}"
          echo "Docs:        ${{ needs.docs.result }}"
          echo "Integration: ${{ needs.integration.result }}"
      - name: ✅ All mandatory stages passed
        if: |
          needs.lint.result == 'success' &&
          needs.build.result == 'success' &&
          needs.test.result == 'success' &&
          needs.audit.result == 'success'
        run: echo "✅ All mandatory stages passed"
      - name: ❌ Some mandatory stages failed
        if: |
          needs.lint.result != 'success' ||
          needs.build.result != 'success' ||
          needs.test.result != 'success' ||
          needs.audit.result != 'success'
        run: |
          echo "❌ Mandatory stage(s) failed"
          exit 1
