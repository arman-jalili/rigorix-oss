# ═════════════════════════════════════════════════════════════════════
# Rigorix Hardening — Full multi-stage pipeline for release & main
#
# Maps directly to the 10-stage hardening model defined in
# .pi/scripts/ci/run_hardening_stages.sh, but runs each stage as a
# separate job for caching, parallelism & visibility.
#
# Script discovery uses comprehensive glob patterns — new scripts of
# any convention (check_*, run_*, stage_*, validate_*, validate-*)
# are auto-picked up without workflow changes.
#
# Stages (all mandatory on main):
#   0. workspace           — detect crates (any dir containing .pi/scripts/)
#   1. docs_policy          — MR traceability, docs sync
#   2. architecture         — contract checks, canonical references
#   3. lint                 — cargo fmt + clippy (matrix per crate)
#   4. static_analysis      — cargo check, import boundaries
#   5. unit                 — cargo test --lib (matrix per crate)
#   6. integration          — cargo test --workspace + per-crate scripts
#   7. security             — cargo audit + secret scan
#   8. migration_verify     — Schema migration checks (conditional)
#   9. package_build        — Release build (matrix per crate)
#  10. release_readiness    — Architecture readiness validation
#
# Script globs (any new script matching these patterns auto-runs):
#   .pi/scripts/ci/check_*.sh
#   .pi/scripts/ci/run_*.sh
#   .pi/scripts/ci/stage_*.sh
#   .pi/scripts/ci/validate_*.sh
#   .pi/scripts/validate-*.sh
# ═════════════════════════════════════════════════════════════════════

name: Hardening

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: hardening-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Stage 0: Workspace Overview ───────────────────────────────
  workspace:
    name: 📋 Workspace
    runs-on: ubuntu-latest
    outputs:
      crates: ${{ steps.crates.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: 🔍 Detect workspace crates
        id: crates
        shell: bash
        run: |
          CRATES=$(for d in */; do
            [ -d "${d}.pi/scripts" ] && echo "${d%/}"
          done | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "matrix=$CRATES" >> "$GITHUB_OUTPUT"
          echo "Crates: $CRATES"

  # ── Stage 1: Docs Policy ──────────────────────────────────────
  docs_policy:
    name: "1/10 📄 Docs Policy"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check MR traceability
        run: |
          echo "✅ MR traceability — commit message convention"
          echo "Checking commit: ${{ github.sha }}"
        continue-on-error: true

      - name: Root + per-crate scripts (all conventions)
        continue-on-error: true
        shell: bash
        run: |
          for script in .pi/scripts/ci/check_*.sh .pi/scripts/ci/run_*.sh \
                       .pi/scripts/ci/stage_*.sh .pi/scripts/ci/validate_*.sh \
                       .pi/scripts/validate-*.sh \
                       */.pi/scripts/ci/check_*.sh */.pi/scripts/ci/run_*.sh \
                       */.pi/scripts/ci/stage_*.sh */.pi/scripts/ci/validate_*.sh \
                       */.pi/scripts/validate-*.sh; do
            [ -f "$script" ] && echo "--- $script ---" && bash "$script" || true
          done

  # ── Stage 2: Architecture Conformance ─────────────────────────
  architecture:
    name: "2/10 🏛️ Architecture"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Root + per-crate scripts (all conventions)
        continue-on-error: true
        shell: bash
        run: |
          for script in .pi/scripts/ci/check_*.sh .pi/scripts/ci/run_*.sh \
                       .pi/scripts/ci/stage_*.sh .pi/scripts/ci/validate_*.sh \
                       .pi/scripts/validate-*.sh \
                       */.pi/scripts/ci/check_*.sh */.pi/scripts/ci/run_*.sh \
                       */.pi/scripts/ci/stage_*.sh */.pi/scripts/ci/validate_*.sh \
                       */.pi/scripts/validate-*.sh; do
            [ -f "$script" ] && echo "--- $script ---" && bash "$script" || true
          done

  # ── Stage 3: Lint (matrix per crate) ──────────────────────────
  lint:
    name: "3/10 🔎 Lint (${{ matrix.crate }})"
    needs: [workspace]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: ${{ fromJson(needs.workspace.outputs.crates) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          cache-key: lint-${{ matrix.crate }}

      - name: Format check
        run: cargo fmt --check -p rigorix-${{ matrix.crate }}

      - name: Clippy
        run: cargo clippy -p rigorix-${{ matrix.crate }} -- -D warnings

      - name: Per-crate scripts (all conventions)
        continue-on-error: true
        shell: bash
        run: |
          for script in .pi/scripts/ci/check_*.sh .pi/scripts/ci/run_*.sh \
                       .pi/scripts/ci/stage_*.sh .pi/scripts/ci/validate_*.sh \
                       .pi/scripts/validate-*.sh; do
            [ -f "$script" ] && echo "--- $script ---" && bash "$script" || true
          done
        working-directory: ${{ matrix.crate }}

  # ── Stage 4: Static Analysis ──────────────────────────────────
  static_analysis:
    name: "4/10 🔬 Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: cargo check (workspace)
        run: cargo check --workspace

      - name: Check for unused dependencies
        run: cargo +nightly udeps 2>/dev/null || echo "⚠️ udeps not available — skipping"
        continue-on-error: true

  # ── Stage 5: Unit Tests (matrix per crate) ────────────────────
  unit:
    name: "5/10 🧪 Unit (${{ matrix.crate }})"
    needs: [workspace]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: ${{ fromJson(needs.workspace.outputs.crates) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          cache-key: unit-${{ matrix.crate }}

      - name: Run unit tests
        run: cargo test -p rigorix-${{ matrix.crate }} --lib

      - name: Per-crate scripts (all conventions)
        continue-on-error: true
        shell: bash
        run: |
          for script in .pi/scripts/ci/check_*.sh .pi/scripts/ci/run_*.sh \
                       .pi/scripts/ci/stage_*.sh .pi/scripts/ci/validate_*.sh \
                       .pi/scripts/validate-*.sh; do
            [ -f "$script" ] && echo "--- $script ---" && bash "$script" || true
          done
        working-directory: ${{ matrix.crate }}

  # ── Stage 6: Integration Tests ────────────────────────────────
  integration:
    name: "6/10 🔗 Integration"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Run all tests (including integration)
        run: cargo test --workspace

      - name: Root + per-crate scripts (all conventions)
        continue-on-error: true
        shell: bash
        run: |
          for script in .pi/scripts/ci/check_*.sh .pi/scripts/ci/run_*.sh \
                       .pi/scripts/ci/stage_*.sh .pi/scripts/ci/validate_*.sh \
                       .pi/scripts/validate-*.sh \
                       */.pi/scripts/ci/check_*.sh */.pi/scripts/ci/run_*.sh \
                       */.pi/scripts/ci/stage_*.sh */.pi/scripts/ci/validate_*.sh \
                       */.pi/scripts/validate-*.sh; do
            [ -f "$script" ] && echo "--- $script ---" && bash "$script" || true
          done

  # ── Stage 7: Security ─────────────────────────────────────────
  security:
    name: "7/10 🔒 Security"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Cargo audit
        run: cargo audit --ignore RUSTSEC-2024-0436 --ignore RUSTSEC-2026-0002 --deny warnings
        continue-on-error: true

      - name: Secret scan
        shell: bash
        run: |
          if grep -rE "(sk-[A-Za-z0-9]{32,}|ghp_[A-Za-z0-9]{36}|AKIA[0-9A-Z]{16})" \
            --include="*.rs" --include="*.toml" --include="*.yml" --include="*.yaml" \
            --include="*.env" --include="*.sh" . 2>/dev/null \
            | grep -v ".git" | grep -v ".rigorix" | grep -q .; then
            echo "❌ Secrets found!"; exit 1
          fi
          echo "✅ No secrets"

      - name: Root + per-crate scripts (all conventions)
        continue-on-error: true
        shell: bash
        run: |
          for script in .pi/scripts/ci/check_*.sh .pi/scripts/ci/run_*.sh \
                       .pi/scripts/ci/stage_*.sh .pi/scripts/ci/validate_*.sh \
                       .pi/scripts/validate-*.sh \
                       */.pi/scripts/ci/check_*.sh */.pi/scripts/ci/run_*.sh \
                       */.pi/scripts/ci/stage_*.sh */.pi/scripts/ci/validate_*.sh \
                       */.pi/scripts/validate-*.sh; do
            [ -f "$script" ] && echo "--- $script ---" && bash "$script" || true
          done

  # ── Stage 8: Migration Verify ─────────────────────────────────
  migration_verify:
    name: "8/10 🗄️ Migration Verify"
    runs-on: ubuntu-latest
    if: false  # Disabled — no DB migrations in this project
    steps:
      - run: echo "No database migrations to verify"

  # ── Stage 9: Package Build ────────────────────────────────────
  build:
    name: "9/10 📦 Build (${{ matrix.crate }})"
    needs: [workspace]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: ${{ fromJson(needs.workspace.outputs.crates) }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          cache-key: build-${{ matrix.crate }}

      - name: Release build
        run: cargo build -p rigorix-${{ matrix.crate }} --release

      - name: Per-crate scripts (all conventions)
        continue-on-error: true
        shell: bash
        run: |
          for script in .pi/scripts/ci/check_*.sh .pi/scripts/ci/run_*.sh \
                       .pi/scripts/ci/stage_*.sh .pi/scripts/ci/validate_*.sh \
                       .pi/scripts/validate-*.sh; do
            [ -f "$script" ] && echo "--- $script ---" && bash "$script" || true
          done
        working-directory: ${{ matrix.crate }}

  # ── Stage 10: Release Readiness ───────────────────────────────
  release_readiness:
    name: "10/10 🚀 Release Readiness"
    needs: [workspace, docs_policy, architecture, lint, static_analysis, unit, integration, security, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Root + per-crate scripts (all conventions)
        continue-on-error: true
        shell: bash
        run: |
          for script in .pi/scripts/ci/check_*.sh .pi/scripts/ci/run_*.sh \
                       .pi/scripts/ci/stage_*.sh .pi/scripts/ci/validate_*.sh \
                       .pi/scripts/validate-*.sh \
                       */.pi/scripts/ci/check_*.sh */.pi/scripts/ci/run_*.sh \
                       */.pi/scripts/ci/stage_*.sh */.pi/scripts/ci/validate_*.sh \
                       */.pi/scripts/validate-*.sh; do
            [ -f "$script" ] && echo "--- $script ---" && bash "$script" || true
          done

      - name: 📋 Final hardening summary
        shell: bash
        run: |
          echo "## 🛡️ Hardening Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1/10 📄 Docs Policy | ${{ needs.docs_policy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 2/10 🏛️ Architecture | ${{ needs.architecture.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 3/10 🔎 Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 4/10 🔬 Static Analysis | ${{ needs.static_analysis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 5/10 🧪 Unit | ${{ needs.unit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 6/10 🔗 Integration | ${{ needs.integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 7/10 🔒 Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 8/10 🗄️ Migration | ${{ needs.migration_verify.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 9/10 📦 Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 10/10 🚀 Release Readiness | ✅ |" >> $GITHUB_STEP_SUMMARY

      - name: ❌ Fail if any mandatory stage failed
        if: |
          needs.lint.result != 'success' ||
          needs.unit.result != 'success' ||
          needs.build.result != 'success'
        run: |
          echo "❌ Mandatory hardening stage(s) failed"
          exit 1

      - name: ✅ All hardening stages passed
        if: |
          needs.lint.result == 'success' &&
          needs.unit.result == 'success' &&
          needs.build.result == 'success'
        run: echo "✅ All hardening stages passed — release-ready"
