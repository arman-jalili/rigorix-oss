# cargo-deny configuration
# See https://embarkstudios.github.io/cargo-deny/ for details

[advisories]
vulnerability = "deny"
unmaintained = "warn"
notice = "warn"
yanked = "warn"
ignore = []

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSL-1.0",
    "ISC",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
    "0BSD",
]
deny = []
copyleft = "deny"
allow-osi-fsf-free = "neither"
default = "deny"
confidence = 0.8

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = [
    # tree-sitter has many transitive deps with version conflicts
    { name = "tree-sitter", version = "*" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-org = []
